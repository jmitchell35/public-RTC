name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workdir: Back
      - name: Build release binary
        working-directory: Back
        run: cargo build --release
      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtc-backend
          path: Back/target/release/rtc_backend

  build-desktop:
    name: Build Desktop App (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact: rtc-desktop-linux
            tauri-args: ""
          - platform: windows-latest
            artifact: rtc-desktop-windows
            tauri-args: ""
          - platform: macos-latest
            artifact: rtc-desktop-macos
            tauri-args: "--target universal-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Front/app/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          workdir: Front/app/src-tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install frontend dependencies
        working-directory: Front/app
        run: npm ci
      - name: Build Tauri app
        working-directory: Front/app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run tauri:build -- ${{ matrix.tauri-args }}
      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: Front/app/src-tauri/target/release/bundle/

  create-release:
    name: Create GitHub Release
    needs: [build-backend, build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
