[tools]
node = "22"

[tasks.install]
description = "Install dependencies"
run = "cd app && npm install"

[tasks.dev]
description = "Start Next.js dev server"
run = "cd app && npm run dev"

[tasks.build]
description = "Build for production"
run = "cd app && npm run build"

[tasks.start]
description = "Start production server (run build first)"
run = "cd app && npm run start"

[tasks.lint]
description = "Lint the code"
run = "cd app && npm run lint"

[tasks.desktop]
description = "Run the desktop app (Tauri dev mode)"
run = "cd app && npm run tauri:dev"

[tasks.desktop-build]
description = "Build the desktop app for release"
run = "cd app && npm run tauri:build"
